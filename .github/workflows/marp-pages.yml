name: Deploy marp site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup build directory
        run: |
          mkdir -p build
          cp -R slides/img build/img 2>/dev/null || true
          cp -R slides/themes build/themes

      - name: Marp Build (HTML)
        uses: docker://marpteam/marp-cli:v4
        with:
          args: --theme-set slides/themes -o build/index.html --html -- slides/Slides.md
        env:
          MARP_USER: root:root

      - name: Marp Build (PDF)
        uses: docker://marpteam/marp-cli:v4
        with:
          args: --theme-set slides/themes -o build/Slides.pdf --html --allow-local-files -- slides/Slides.md
        env:
          MARP_USER: root:root

      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'build'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4